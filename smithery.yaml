startCommand:
  type: "stdio"
  configSchema:
    type: "object"
    required: []
    properties:
      installDir:
        type: "string"
        description: "Override the data/config directory (defaults to ~/.local/lib/threnody)."
      allowNoHost:
        type: "boolean"
        default: false
        description: "Allow installer/setup to continue with no host AI CLI detected."
      skipWizard:
        type: "boolean"
        default: true
        description: "Skip the interactive first-run wizard (always true on plugin/uvx paths; no TTY)."
  commandFunction: |
    (config) => ({
      command: "uvx",
      args: ["threnody-mcp"],
      env: {
        ...(config.installDir ? { THRENODY_INSTALL_DIR: config.installDir } : {}),
        THRENODY_ALLOW_NO_HOST: config.allowNoHost ? "1" : "0",
        THRENODY_SKIP_WIZARD: config.skipWizard === false ? "0" : "1",
      }
    })
runtime: python
