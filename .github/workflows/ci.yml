name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip pyyaml pytest
      - name: Hermetic test suite
        env:
          THRENODY_TEST_MODE: "1"
        run: python -m pytest tests/ -q

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python
        run: python -m compileall -q mcp_server.py shared codex copilot claude-code gemini
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate shell scripts
        run: |
          sudo apt-get install -y zsh
          find . -type f -name '*.sh' -not -path './.git/*' -not -path './.planning/*' -print0 |
            xargs -0 -n1 bash -n
          find . -type f -name '*.sh' -not -path './.git/*' -not -path './.planning/*' -print0 |
            xargs -0 shellcheck
          zsh -n shell/ghc shell/threnody

  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject generated runtime artifacts
        run: |
          python3 scripts/check_release_archive.py
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer syntax and inventory smoke
        env:
          THRENODY_TEST_MODE: "1"
        run: |
          bash -n install.sh
          python3 -c "from shared.discovery import installer_provider_inventory; installer_provider_inventory()"

  installer-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer syntax and inventory smoke
        env:
          THRENODY_TEST_MODE: "1"
        run: |
          bash -n install.sh
          python3 -c "from shared.discovery import installer_provider_inventory; installer_provider_inventory()"
