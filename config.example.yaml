# Safe example configuration for Threnody.
# Copy to ~/.local/lib/threnody/config.yaml after installation and customize.
# Do not add API keys, bearer tokens, passwords, or machine-specific secrets.

parallelism:
  enabled: true
  max_workers: 0
  # Opt-in throughput tuning (safe defaults preserve prior behavior):
  speculation_workers: 1   # concurrent higher-tier speculation lanes (cap 8)
  warm_path_workers: 2     # parallel rework eval batch size (cap 8)

# Persistent MCP daemon loops. Longer intervals = fewer idle wakeups (less
# background CPU). Set *_enabled: false to skip spawning the thread entirely.
# Legacy resilience.health_probe_interval_s is honored as a fallback default.
background:
  health_probe_enabled: true
  health_probe_interval_s: 60    # probe quarantined providers (min 5)
  warm_path_enabled: true
  warm_path_interval_s: 120      # drain learning_queue plus warm-path backlog (min 5)

swarm:
  max_agents: 12
  # host_native (default for MCP host shells): plan in Threnody, execute waves via host Agent/Task
  # delegate: legacy subprocess orchestrator fanout (higher billing/policy surface)
  host_execution_mode: host_native
  # host_execution_mode_by_caller:
  #   claude-code: host_native
  #   github-copilot: host_native

  # Multi-queen consensus (EXPERIMENTAL — off by default)
  # Runs N persona-diverse queens in parallel; they review independently and a judge
  # arbitrates only when quorum is not reached. Token cost: ~2-3x a single round.
  # Two paths share one decision engine (shared/consensus.py):
  #   - subprocess star topology   → queens may cross providers (opt-in)
  #   - host-native swarm wave      → host spawns read-only review queens on the host
  #     model; diversity comes from personas, not providers
  # consensus:
  #   enabled: false
  #   queens: 2                  # parallel queens (clamped 2-3)
  #   queen_tier: low            # tier for queen subtasks
  #   judge_tier: low            # tier for the judge when queens disagree
  #   max_consensus_rounds: 1    # rounds that use consensus (0 = all rounds)
  #   host_native_enabled: false # append a consensus wave on star/auto host swarms
  #   personas: []               # override built-in reviewer stances (empty → defaults)
  #   quorum: 2                  # min agreeing queens (clamped 2..queens)
  #   cross_provider_enabled: false  # subprocess path only; host-native never crosses

budgets:
  default_hard_cap_tokens: 1000
  default_soft_warning_pct: 0.8

cache:
  ttl_hours: 24
  backup_keep: 3

providers:
  # Router-only host (claude-code) coordinates in the MCP host shell by default.
  # It is excluded from execute_subtask delegation unless explicitly overridden:
  #
  # router_only_allow_execution:
  #   - claude-code
  #
  # Override is lower risk when Claude Code uses API-key billing (pay-per-token).
  # Subscription OAuth (Pro/Max) subprocess delegation carries provider-policy risk.
  # Threnody cannot detect auth mode — verify before enabling. See docs/LEGAL.md.
  #
  # Meta-harness default: host shells execute via host_spawn (Agent/Task).
  # Optional utility delegation — never to other host CLIs (Copilot, Codex, Cursor, …).
  #
  # delegation_utilities_enabled: false
  # delegation_utilities:
  #   - opencode
  #   - aider
  # Local loopback endpoints (ollama, configured local HTTPS) are allowed when enabled.
  #
  effort_defaults:
    claude-code:
      low: low
      medium: medium
      high: max
    codex:
      low: minimal
      medium: medium
      high: xhigh
  timeouts:
    low: 120
    medium: 120
    high: 120

routing_policy:
  # default → advisory for all shells | guarded | advisory | custom  (strict is deprecated → guarded)
  mode: default
  shells: {}

# When true, low-tier delegate guards hard-block Edit/Write until execute_subtask runs.
# Default false — guarded mode allows host-native edits after route_task.
execute_subtask_guard_strict: false

routing_exceptions:
  # Built-in defaults already cover Markdown and known AI instruction files.
  filetypes: []
  paths: []

verify_gate:
  enabled: false
  mode: warn
  signals:
    lint:
      command: auto
      required: false
      timeout_seconds: 120
    types:
      command: auto
      required: true
      timeout_seconds: 120
    tests:
      command: auto
      required: true
      timeout_seconds: 300

surgical_edits:
  max_file_bytes: 32768
  blocks_max_file_bytes: 131072
  length_ratio_min: 0.5

orchestrator:
  # host_native (default for MCP host shells): heuristic plan in Threnody, no external planner CLI
  # delegate: legacy LLM planner via Copilot/Codex subprocess
  planner_host_execution_mode: host_native
  # planner_host_execution_mode_by_caller:
  #   claude-code: host_native
  #   cursor: host_native
  # End-of-run synthesis merge strategy:
  # off = single-pass only; auto = map-reduce when outputs exceed chunk size;
  # always = map-reduce even for small result sets.
  synthesis_map_reduce: auto
  synthesis_chunk_chars: 12000
  # Fan out host-native plans to one agent per file when intent implies a multi-file app
  heuristic_intent_templates: true

resilience:
  retry:
    attempts: 3
    base_delay_s: 0.5
    max_delay_s: 8.0
    jitter_ratio: 0.3
  circuit_breaker:
    failure_threshold: 3
    open_seconds: 120
    quota_open_seconds: 1800
    auth_open_seconds: 600
  auth_probe:
    ttl_seconds: 600
    enabled: true

learning:
  # Skill export — write approved learned agents as provider-native skill files
  skill_export:
    enabled: true
    providers:
      - claude-code
      # - github-copilot-cli   # writes to .github/agents/<slug>.md
      # - opencode             # writes to .opencode/agent/<slug>.md
    promotion_threshold: 10    # match_count before promoting to user-global skills dir
    auto_promote: false        # promote automatically on threshold hit; default: manual via CLI
