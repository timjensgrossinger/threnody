# Safe example configuration for Threnody.
# Copy to ~/.local/lib/threnody/config.yaml after installation and customize.
# Do not add API keys, bearer tokens, passwords, or machine-specific secrets.

parallelism:
  enabled: true
  max_workers: 0

swarm:
  max_agents: 12

budgets:
  default_hard_cap_tokens: 1000
  default_soft_warning_pct: 0.8

cache:
  ttl_hours: 24
  backup_keep: 3

providers:
  # Safer routing for non-Claude hosts: avoid selecting claude-code when Copilot,
  # Cursor, or Codex is the MCP host. See docs/LEGAL.md.
  #
  # preferred_routing_by_caller:
  #   github-copilot:
  #     low:
  #       - provider: github-copilot
  #       - provider: gemini-cli
  #     medium:
  #       - provider: github-copilot
  #       - provider: codex
  #   cursor:
  #     low:
  #       - provider: cursor
  #       - provider: github-copilot
  #     medium:
  #       - provider: cursor
  #       - provider: codex
  #   codex:
  #     low:
  #       - provider: codex
  #       - provider: github-copilot
  #     medium:
  #       - provider: codex
  #
  # Hard allowlist (optional): only these providers may execute for a caller.
  # caller_allowlists:
  #   github-copilot:
  #     - github-copilot
  #     - gemini-cli
  #     - codex
  #   cursor:
  #     - cursor
  #     - github-copilot
  #     - codex
  #   codex:
  #     - codex
  #     - github-copilot
  #     - cursor
  #
  # Claude Code host → Claude Code is blocked by default. To override (Anthropic
  # ToS risk; prefer API keys for automated cross-session routing):
  #
  # preferred_routing_by_caller:
  #   claude-code:
  #     low:
  #       - provider: claude-code
  #
  effort_defaults:
    claude-code:
      low: low
      medium: medium
      high: max
    codex:
      low: minimal
      medium: medium
      high: xhigh
  timeouts:
    low: 120
    medium: 120
    high: 120

routing_policy:
  # default | strict | advisory | custom
  mode: default
  shells: {}

routing_exceptions:
  # Built-in defaults already cover Markdown and known AI instruction files.
  filetypes: []
  paths: []

verify_gate:
  enabled: false
  mode: warn
  signals:
    lint:
      command: auto
      required: false
      timeout_seconds: 120
    types:
      command: auto
      required: true
      timeout_seconds: 120
    tests:
      command: auto
      required: true
      timeout_seconds: 300

surgical_edits:
  max_file_bytes: 32768
  blocks_max_file_bytes: 131072
  length_ratio_min: 0.5

resilience:
  retry:
    attempts: 3
    base_delay_s: 0.5
    max_delay_s: 8.0
    jitter_ratio: 0.3
  circuit_breaker:
    failure_threshold: 3
    open_seconds: 120
    quota_open_seconds: 1800
    auth_open_seconds: 600
  auth_probe:
    ttl_seconds: 600
    enabled: true
